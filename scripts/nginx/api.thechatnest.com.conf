# ─── api.thechatnest.com — Nginx server block ──────────────────────────
# Deployed to /etc/nginx/sites-available/api.thechatnest.com on the VPS.
# scripts/deploy.sh symlinks this into sites-enabled and reloads nginx
# automatically when the file's hash changes.
#
# The SSL blocks were added by certbot during the initial setup
# (`certbot --nginx -d api.thechatnest.com`). Keep the "managed by
# Certbot" comments intact so future `certbot renew` runs find them.
# ───────────────────────────────────────────────────────────────────────

server {
    server_name api.thechatnest.com;

    # File-upload cap. Multer (chat-file route) accepts up to 500 MB —
    # nginx has to match or it 413s before the request reaches Node.
    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket / Socket.io upgrade headers — required for the chat
        # transport to fall through nginx's proxy correctly.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client identity for rate-limiting + audit logs.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-poll / SSE / sticky socket idle window. 86400s = 24h, well
        # above any single legitimate request.
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.thechatnest.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.thechatnest.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.thechatnest.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.thechatnest.com;
    return 404; # managed by Certbot
}
