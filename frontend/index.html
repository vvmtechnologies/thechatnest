              "query-input": "required name=search_term_string"

          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://www.thechatnest.com/#software",
            "name": "TheChatNest",

            "applicationSubCategory": "Communication",

                "name": "Is TheChatNest secure?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. All messages are end-to-end encrypted in transit and at rest. We're DPDP (India) and GDPR (EU) aligned, and data is hosted in Indian regions by default."
                }
              },
              {
                "@type": "Question",
                "name": "How much does TheChatNest cost?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Plans start at ₹199 per user per month, billed monthly. Every paid plan includes a 14-day free trial — no credit card required to start."
                }
              },
              {
                "@type": "Question",
                "name": "Can I self-host TheChatNest?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. We offer on-premise and air-gapped deployments for teams that need full data sovereignty. Contact sales for details."
                }
              },
              {
                "@type": "Question",
                "name": "Does TheChatNest replace Slack or Microsoft Teams?",
                "acceptedAnswer": {
                  "@type": "Answer",
