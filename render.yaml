services:
  - type: web
    name: thechatnest-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Database (Neon) — set these in Render dashboard manually
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # Frontend / CORS
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

      # Encryption
      - key: CHAT_ENCRYPTION_KEY
        generateValue: true
      - key: PAYMENT_GATEWAY_ENCRYPTION_KEY
        generateValue: true

      # Cookies
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_DOMAIN
        sync: false

      # Redis (optional — disabled by default)
      - key: REDIS_ENABLED
        value: "false"

      # AWS S3 (set in dashboard)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false

      # SMTP (set in dashboard)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # Web Push (VAPID) — generate via: npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

      # Branding
      - key: APP_NAME
        value: TheChatNest

      # Optional: payments
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: TENOR_API_KEY
        sync: false
