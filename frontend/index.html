<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary -->
    <title>TheChatNest — Secure Team Messaging, Calls & AI for Modern Businesses</title>
    <meta
      name="description"
      content="TheChatNest is a secure team workspace for messaging, HD calls, file sharing, and AI assistance. Self-hosted or cloud — built for businesses that own their data. Free 14-day trial."
    />
    <meta
      name="keywords"
      content="team chat, business messaging, slack alternative, secure messaging, self-hosted chat, on-premise messaging, team collaboration, group chat app, video calls, AI chat assistant, GDPR compliant chat, enterprise messaging"
    />
    <meta name="author" content="TheChatNest" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0b0f1e" />
    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://www.thechatnest.com/" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/chat.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/thechatnest_logo_element.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/chat.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TheChatNest" />
    <meta property="og:title" content="TheChatNest — Secure Team Messaging, Calls & AI" />
    <meta
      property="og:description"
      content="One workspace to chat, meet, share, and create. Self-hosted or cloud, end-to-end encrypted, AI-powered. Start free for 14 days."
    />
    <meta property="og:url" content="https://www.thechatnest.com/" />
    <meta property="og:image" content="https://www.thechatnest.com/og-cover.png" />
    <meta property="og:image:secure_url" content="https://www.thechatnest.com/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TheChatNest — Secure team workspace" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@thechatnest" />
    <meta name="twitter:creator" content="@thechatnest" />
    <meta name="twitter:title" content="TheChatNest — Secure Team Messaging, Calls & AI" />
    <meta
      name="twitter:description"
      content="One workspace to chat, meet, share, and create. Self-hosted or cloud, end-to-end encrypted, AI-powered."
    />
    <meta name="twitter:image" content="https://www.thechatnest.com/og-cover.png" />

    <!-- Preconnects -->
    <link rel="preconnect" href="https://thechatnest-api.onrender.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
    />

    <!-- Structured data: Organization + Software -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "TheChatNest",
            "url": "https://www.thechatnest.com",
            "logo": "https://www.thechatnest.com/chat.png",
            "sameAs": [
              "https://twitter.com/thechatnest",
              "https://www.linkedin.com/company/thechatnest"
            ],
            "contactPoint": {
              "@type": "ContactPoint",
              "email": "support@thechatnest.com",
              "contactType": "customer support",
              "areaServed": "Worldwide"
            }
          },
          {
            "@type": "SoftwareApplication",
            "name": "TheChatNest",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web, Windows, macOS, Linux, iOS, Android",
            "description": "Secure team messaging, HD calls, file sharing, and AI assistance for modern businesses.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "INR",
              "description": "Free 14-day trial, no credit card required"
            },
            "aggregateRating": {
              "@type": "AggregateRating",
              "ratingValue": "4.9",
              "ratingCount": "200"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <noscript>
      <p style="font-family: sans-serif; padding: 24px; max-width: 640px; margin: 40px auto;">
        TheChatNest requires JavaScript to work. Please enable JavaScript in your browser settings to continue.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
