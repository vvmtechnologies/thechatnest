<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#6d5dfc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6d5dfc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 H0 V60" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark — gold rounded square with TCN -->
  <g transform="translate(90, 78)">
    <rect x="0" y="0" width="76" height="76" rx="20" fill="url(#gold)"/>
    <text x="38" y="51" text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-size="26" font-weight="900" letter-spacing="-1" fill="#1a1f3a">TCN</text>
  </g>
  <text x="190" y="118" font-family="'Inter', system-ui, sans-serif"
        font-size="28" font-weight="700" fill="#fff" letter-spacing="-0.5">TheChatNest</text>
  <text x="190" y="148" font-family="'JetBrains Mono', monospace"
        font-size="14" font-weight="600" fill="#ffd54a" letter-spacing="2">SECURE TEAM WORKSPACE</text>

  <!-- Main headline -->
  <text x="90" y="320" font-family="'Inter', system-ui, sans-serif"
        font-size="86" font-weight="800" fill="#fff" letter-spacing="-3.5">One workspace.</text>
  <text x="90" y="408" font-family="'Inter', system-ui, sans-serif"
        font-size="86" font-weight="300" font-style="italic" fill="rgba(255,255,255,0.65)" letter-spacing="-2">built for teams that</text>
  <text x="90" y="496" font-family="'Inter', system-ui, sans-serif"
        font-size="86" font-weight="700" fill="#fff" letter-spacing="-2.5">
    ship <tspan fill="#ffd54a">before lunch.</tspan>
  </text>

  <!-- Bottom strip -->
  <line x1="90" y1="545" x2="1110" y2="545" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <g font-family="'JetBrains Mono', monospace" font-size="15" fill="rgba(255,255,255,0.75)" letter-spacing="1">
    <text x="90" y="578">CHAT  ·  MEET  ·  SHARE  ·  ENCRYPT</text>
    <text x="1110" y="578" text-anchor="end" fill="#ffd54a">thechatnest.com</text>
  </g>

  <!-- Tiny pulse dot -->
  <circle cx="78" cy="572" r="4" fill="#22c55e"/>
  <text x="58" y="578" font-family="'JetBrains Mono', monospace" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="1.5" text-anchor="end">LIVE</text>
</svg>
