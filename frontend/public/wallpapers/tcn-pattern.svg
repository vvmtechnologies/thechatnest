<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <!--
    TheChatNest — default chat wallpaper.
    Soft chat-iconography pattern + a subtle "TheChatNest" wordmark watermark.
    All strokes share an 'ink' tone at low opacity so text never overpowers messages.
  -->
  <defs>
    <pattern id="tcnDoodle" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <g stroke="#0b0f1e" stroke-width="1.4" fill="none" opacity="0.085" stroke-linecap="round" stroke-linejoin="round">
        <!-- chat bubble -->
        <path d="M20 28 q0 -10 10 -10 h40 q10 0 10 10 v18 q0 10 -10 10 h-22 l-10 8 v-8 h-8 q-10 0 -10 -10 z"/>
        <circle cx="35" cy="36" r="1.2" fill="#0b0f1e"/>
        <circle cx="45" cy="36" r="1.2" fill="#0b0f1e"/>
        <circle cx="55" cy="36" r="1.2" fill="#0b0f1e"/>

        <!-- sparkle -->
        <path d="M150 30 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>

        <!-- heart -->
        <path d="M120 90 c-6 -8 -18 -2 -18 8 c0 10 18 22 18 22 s18 -12 18 -22 c0 -10 -12 -16 -18 -8 z"/>

        <!-- envelope -->
        <rect x="32" y="92" width="38" height="26" rx="3"/>
        <path d="M32 96 l19 12 19 -12"/>

        <!-- gear -->
        <circle cx="170" cy="120" r="10"/>
        <circle cx="170" cy="120" r="3"/>
        <g>
          <line x1="170" y1="106" x2="170" y2="111"/>
          <line x1="170" y1="129" x2="170" y2="134"/>
          <line x1="156" y1="120" x2="161" y2="120"/>
          <line x1="179" y1="120" x2="184" y2="120"/>
          <line x1="160" y1="110" x2="163.5" y2="113.5"/>
          <line x1="176.5" y1="126.5" x2="180" y2="130"/>
          <line x1="180" y1="110" x2="176.5" y2="113.5"/>
          <line x1="163.5" y1="126.5" x2="160" y2="130"/>
        </g>

        <!-- circle with dot -->
        <circle cx="65" cy="155" r="11"/>
        <circle cx="65" cy="155" r="2" fill="#0b0f1e"/>

        <!-- arrow up-right -->
        <path d="M120 165 l18 -18 m0 0 h-10 m10 0 v10"/>

        <!-- speech ellipsis bubble -->
        <ellipse cx="170" cy="180" rx="18" ry="11"/>
        <circle cx="165" cy="180" r="1.3" fill="#0b0f1e"/>
        <circle cx="170" cy="180" r="1.3" fill="#0b0f1e"/>
        <circle cx="175" cy="180" r="1.3" fill="#0b0f1e"/>

        <!-- check -->
        <path d="M30 178 l5 5 10 -12"/>
      </g>
    </pattern>
  </defs>

  <rect width="800" height="800" fill="#fafbff"/>
  <rect width="800" height="800" fill="url(#tcnDoodle)"/>

  <!-- Soft wordmark watermark, centered, very low contrast -->
  <text
    x="400"
    y="408"
    text-anchor="middle"
    font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#0b0f1e"
    opacity="0.07"
    letter-spacing="-1.2"
  >TheChatNest</text>
</svg>
